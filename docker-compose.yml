version: '3.8'

services:
  # PostgreSQL veritabanı
  postgres:
    image: postgres:16-alpine
    container_name: ds_akademi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ds_akademi
      POSTGRES_USER: ds_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ds_user -d ds_akademi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js uygulaması
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ds_akademi_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ds_user:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/ds_akademi
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Persist uploaded files
      - uploads_data:/app/public/uploads

volumes:
  postgres_data:
  uploads_data:
